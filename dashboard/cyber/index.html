<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cybersecurity Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="w-64 bg-gray-800 p-4 flex flex-col">
    <div class="mb-6">
        <img src="/access/logo_white.png" alt="MS RiskTec Logo" class="w-full h-24 object-contain"/>

    </div>
    <input class="w-full p-2 bg-gray-700 rounded text-gray-300 mb-4" placeholder="Search" type="text"/>

    <nav>
      <ul>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/"><i class="fas fa-chart-line mr-2"></i> ERM Score</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/calculate/"><i class="fas fa-chart-pie mr-2"></i> Calculate ERM Score</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/ews/"><i class="fas fa-folder-open mr-2"></i> EWS Dashboard Demo</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/fx/"><i class="fas fa-dollar-sign mr-2"></i> FX Dashboard</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/esg/"><i class="fas fa-leaf mr-2"></i> ESG</a></li>
        <li class="mb-2"><a class="flex items-center p-2 bg-blue-600 rounded" href="/dashboard/cyber/"><i class="fas fa-shield-alt mr-2"></i> Cybersecurity</a></li>
      </ul>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col items-center justify-center min-h-screen bg-gray-900 p-6 overflow-auto">
    <div class="flex flex-col items-center justify-center bg-gray-800 rounded-2xl shadow-2xl px-10 py-16 w-full max-w-lg mx-auto">
      <img src="/access/logo_white.png" alt="MS Risk Tec Logo" class="w-32 h-32 mb-8 object-contain drop-shadow-lg">
      <h1 class="text-5xl md:text-6xl font-extrabold mb-2 tracking-wide text-white drop-shadow">Coming Soon</h1>
      <h2 class="text-2xl md:text-3xl font-semibold mb-6 text-blue-200">MS Risk Tec</h2>
      <p class="text-lg text-gray-300 mb-2">Our Cybersecurity Dashboard is launching soon.</p>
      
    </div>
  </div>

</html>
