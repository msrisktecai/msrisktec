<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ERM Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="w-64 bg-gray-800 p-4 flex flex-col">
    <div class="mb-6">
      <img src="/access/logo_white.png" alt="MS RiskTec Logo" class="w-full h-24 object-contain"/>
    </div>
    <input class="w-full p-2 bg-gray-700 rounded text-gray-300 mb-4" placeholder="Search" type="text"/>

    <nav>
      <ul>
        <li class="mb-2"><a class="flex items-center p-2 bg-blue-600 rounded" href="/dashboard/"><i class="fas fa-chart-line mr-2"></i> ERM Score</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded " href="/dashboard/calculate/"><i class="fas fa-chart-pie mr-2"></i> Calculate ERM Score</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/ews/"><i class="fas fa-folder-open mr-2"></i> EWS Dashboard Demo</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/fx/"><i class="fas fa-dollar-sign mr-2"></i> FX Dashboard</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/esg/"><i class="fas fa-leaf mr-2"></i> ESG</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/cyber/"><i class="fas fa-shield-alt mr-2"></i> Cybersecurity</a></li>
      </ul>
    </nav>
    
  </div>

  <!-- Main Content -->
  <div class="flex-1 p-6 overflow-auto">
    <header class="mb-4">
      <h1 class="text-2xl font-bold">Enterprise Risk Management Score</h1>
    </header>

    <!-- Graph & Table Container -->
    <div class="bg-gray-800 p-4 rounded mb-4 flex space-x-4">
      <!-- Graph (Bigger) -->
      <div class="w-3/5 flex flex-col items-center">
        <h3 class="mb-2 text-lg font-bold">Yearly Avg Across Companies</h3>
        <canvas id="avgChart" class="w-full h-60"></canvas> 
      </div>

      <!-- Table (Smaller) -->
      <div class="w-2/5">
        <h3 class="mb-2 text-lg font-bold">Yearly Avg Scores</h3>
        <table class="w-full text-left border-collapse bg-gray-700 rounded text-sm">
          <thead>
            <tr class="bg-gray-600">
              <th class="border-b p-2">Year</th>
              <th class="border-b p-2">Avg Score</th>
            </tr>
          </thead>
          <tbody id="avgTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const yearlyAvgScores = {
      2015: 1.93, 2016: 1.47, 2017: 1.63, 2018: 1.52, 2019: 1.66,
      2020: 1.99, 2021: 1.82, 2022: 1.78, 2023: 2.12, 2024: 1.80
    };

    function loadYearlyAverages() {
      let labels = Object.keys(yearlyAvgScores);
      let scores = Object.values(yearlyAvgScores);

      let ctx = document.getElementById("avgChart").getContext("2d");
      new Chart(ctx, {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label: "Yearly Avg Scores",
            data: scores,
            borderColor: "orange",
            fill: false
          }]
        }
      });

      let tableBody = document.getElementById("avgTable");
      tableBody.innerHTML = "";
      labels.forEach(year => {
        tableBody.innerHTML += `<tr><td class="border-b p-2">${year}</td><td class="border-b p-2">${yearlyAvgScores[year]}</td></tr>`;
      });
    }

    window.onload = loadYearlyAverages;
  </script>

</body>
</html>
