<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Score Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="w-64 bg-gray-800 p-4 flex flex-col">
    <div class="mb-6">
      <img src="/access/logo_white.png" alt="MS RiskTec Logo" class="w-full h-24 object-contain"/>
    </div>
    <input class="w-full p-2 bg-gray-700 rounded text-gray-300 mb-4" placeholder="Search" type="text"/>

    <nav>
      <ul>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/"><i class="fas fa-chart-line mr-2"></i> ERM Score</a></li>
        <li class="mb-2"><a class="flex items-center p-2 bg-blue-600 rounded" href="/dashboard/calculate/"><i class="fas fa-chart-pie mr-2"></i> Calculate ERM Score</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/ews/"><i class="fas fa-folder-open mr-2"></i> EWS Dashboard Demo</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/fx/"><i class="fas fa-dollar-sign mr-2"></i> FX Dashboard</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/esg/"><i class="fas fa-leaf mr-2"></i> ESG</a></li>
        <li class="mb-2"><a class="flex items-center p-2 hover:bg-gray-700 rounded" href="/dashboard/cyber/"><i class="fas fa-shield-alt mr-2"></i> Cybersecurity</a></li>
      </ul>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-1 p-6 overflow-auto">
    <header class="mb-4">
      <h1 class="text-2xl font-bold">PDF Score Calculator</h1>
    </header>

    <!-- Upload Form -->
    <div class="bg-gray-800 p-6 rounded mb-4">
      <h3 class="text-lg font-bold mb-4">Upload a PDF to Calculate Score</h3>
      <form id="upload-form" class="flex flex-col space-y-4">
        <input type="file" id="pdf-file" accept="application/pdf" 
               class="bg-gray-700 text-gray-300 p-2 rounded cursor-pointer"
               required>
        <button type="submit" 
                class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
          Upload & Process
        </button>
      </form>
      <div id="result" class="mt-4 text-lg font-semibold text-yellow-400"></div>
    </div>
  </div>

  <!-- JS -->
  <script>
    document.getElementById("upload-form").addEventListener("submit", async function(event) {
      event.preventDefault();
      const fileInput = document.getElementById("pdf-file");
      const file = fileInput.files[0];

      if (!file) {
        alert("Please select a file.");
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch("http://127.0.0.1:8000/upload/", {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (response.ok) {
          document.getElementById("result").innerHTML = 
            `Score for ${result.filename}: <b>${result.score}</b>`;
        } else {
          document.getElementById("result").innerHTML = 
            `<span style="color: red;">Error: ${result.error}</span>`;
        }
      } catch (error) {
        document.getElementById("result").innerHTML = 
          `<span style="color: red;">Failed to upload file.</span>`;
      }
    });
  </script>

</body>
</html>
